<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>just-US 💕</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    padding: 20px;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 15px;
    max-width: 500px;
    margin: auto;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 20px;
    border: none;
    background: #ff4d6d;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #ff1e4d;
}

#finalMessage {
    display: none;
    font-size: 24px;
    color: #ff1e4d;
    margin-top: 20px;
}

/* Heart Animation */
.heart {
    position: fixed;
    bottom: -10px;
    color: red;
    font-size: 20px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
    <h2>💖 just-US 💖</h2>

    <p>1. First meet epo (date)?</p>
    <input type="text">

    <p>2. Naa fight panna apo do u feel tired of me?</p>
    <input type="text">

    <p>3. Enna epo paaka varuva?</p>
    <input type="text">

    <p>4. Kalyanam panikalaama?</p>
    <input type="text">

    <p>5. Yethana babies venum?</p>
    <input type="text">

    <p>6. Couple ah trip polaama?</p>
    <input type="text">

    <p>7. Honeymoon ku enga polaam?</p>
    <input type="text">

    <p>8. En mela epomey idhey love poda irupiya?</p>
    <input type="text">

    <br><br>
    <button onclick="showLove()">Submit 💌</button>

    <div id="finalMessage">
        ❤️ I love you darling ❤️
    </div>
</div>

<!-- Music -->
<audio id="bgMusic" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mp3">
</audio>

<script>
function showLove() {
    document.getElementById("finalMessage").style.display = "block";

    // Play music
    document.getElementById("bgMusic").play();

    // Create hearts
    setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 20 + 10 + "px";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }, 300);
}
</script>

</body>
</html>
